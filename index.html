<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <title>Typing Trainer - Treine seu tempo de digitação</title>
</head>
<body>
    <header class="header" id="header">
        <div class="logo-header">
            <img src="assets/img/Typing-Trainer-logo.png" alt="Logo do Typing Trainer">
        </div>
        <nav class="navbar">
            <ul class="lista-navbar">
                <li><a href="#">Home</a></li>
                <li><a href="#">Levels</a></li>
                <li><a href="#">Credits</a></li>
            </ul>
        </nav>
    </header>

    <main class="main" id="main">
        <section class="typing-area">
            <section class="texts column">
                <div class="info-text">
                    <h1>Escreva o texto abaixo:</h1>
                    <p>TEXTO ESTARÁ AQUI</p>
                    <input id="input-texto" type="text" disabled value="">
                </div>
                <div class="progresso">
                    <p>tempo: <span id="timer">00:00</span></p>
                    <progress id="progress" value="50" max="100"></progress>
                </div>

            </section>
            <section class="keyboard column">
                <div class="keyboard-body">
                    <button>esc<br>" '</button>
                    <button onclick="digitar('1')">!<br>1 ¹</button>
                    <button onclick="digitar('2')">@<br>2 ²</button>
                    <button onclick="digitar('3')">#<br>3 ³</button>
                    <button onclick="digitar('4')">$<br>4 £</button>
                    <button onclick="digitar('5')">%<br>5 ¢</button>
                    <button onclick="digitar('6')">¨<br>6</button>
                    <button onclick="digitar('7')">&<br>7</button>
                    <button onclick="digitar('8')">*<br>8</button>
                    <button onclick="digitar('9')">(<br>9</button>
                    <button onclick="digitar('0')">)<br>0</button>
                    <button onclick="digitar('-')">_<br>-</button>
                    <button onclick="digitar('=')">+<br>= §</button>
                    <button onclick="apagar()">backspace</button>

                    <button>tab</button>
                    <button data-key="q" onclick="digitar('q')">Q</button>
                    <button data-key="w" onclick="digitar('w')">W</button>
                    <button data-key="e" onclick="digitar('e')">E</button>
                    <button data-key="r" onclick="digitar('r')">R</button>
                    <button data-key="t" onclick="digitar('t')">T</button>
                    <button data-key="y" onclick="digitar('y')">Y</button>
                    <button data-key="u" onclick="digitar('u')">U</button>
                    <button data-key="i" onclick="digitar('i')">I</button>
                    <button data-key="o" onclick="digitar('o')">O</button>
                    <button data-key="p" onclick="digitar('p')">P</button>
                    <button onclick="digitar('´')">`<br>´</button>
                    <button onclick="digitar('[')">&lbrace;<br>[ ª</button>
                    <button class="btn-enter">enter</button>

                    <button class="btn-caps">Caps Lock</button>
                    <button>A</button>
                    <button>S</button> 
                    <button>D</button>
                    <button>F</button>
                    <button>G</button>
                    <button>H</button>
                    <button>J</button>
                    <button>K</button>
                    <button>L</button>
                    <button>Ç</button>
                    <button>^ <br> ~</button>
                    <button>&rbrace;<br>] º</button>

                    <button>Shift</button>
                    <button>| <br> \</button>
                    <button>Z</button>
                    <button>X</button>
                    <button>C</button>
                    <button>V</button>
                    <button>B</button>
                    <button>N</button>
                    <button>M</button>
                    <button>&lt; <br> ,</button>
                    <button>&gt; <br> .</button>
                    <button>: <br> ;</button>
                    <button class="btn-shift">Shift</button>

                    <button class="btn-ctrl">Ctrl</button>
                    <button>Fn</button>
                    <button>Alt</button>
                    <button class="btn-space">Space</button>
                    <button>alt gr</button>
                    <button>? <br> / ° </button>
                    <button class="btn-ctrl">Ctrl</button>
                </div>
            </section>
        </section>
        <section class="blur-background">
            <section class="texto-inicial">
                <h1>Bem-vindo ao Typing Trainer!</h1>
                <p>Treine seu tempo de digitação e melhore suas habilidades de digitação com nosso site interativo.</p>
                <p><span>PRESSIONE</span> qualquer tecla para começar!</p>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
