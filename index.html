<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <title>Typing Trainer - Treine seu tempo de digitação</title>
</head>
<body>
    <header class="header" id="header">
        <div class="logo-header">
            <img src="assets/img/Typing-Trainer-logo.png" alt="Logo do Typing Trainer">
        </div>
        <nav class="navbar">
            <ul class="lista-navbar">
                <li><a href="#">Home</a></li>
                <li><a href="#">Levels</a></li>
                <li><a href="#">Credits</a></li>
            </ul>
        </nav>
    </header>

    <main class="main" id="main">
        <section class="typing-area">
            <section class="texts column">
                <h2>HELLO, WORLD!</h2>
            </section>
            <section class="keyboard column">
                <div class="keyboard-body">
                    <button>esc<br>" '</button>
                    <button>!<br>1 ¹</button>
                    <button>@<br>2 ²</button>
                    <button>#<br>3 ³</button>
                    <button>$<br>4 £</button>
                    <button>%<br>5 ¢</button>
                    <button>¨<br>6</button>
                    <button>&<br>7</button>
                    <button>*<br>8</button>
                    <button>(<br>9</button>
                    <button>)<br>0</button>
                    <button>_<br>-</button>
                    <button>+<br>= §</button>
                    <button>backspace</button>

                    <button>tab</button>
                    <button>Q</button>
                    <button>W</button>
                    <button>E</button>
                    <button>R</button>
                    <button>T</button>
                    <button>Y</button>
                    <button>U</button>
                    <button>I</button>
                    <button>O</button>
                    <button>P</button>
                    <button>`<br>´</button>
                    <button>&lbrace;<br>[ ª</button>
                    <button class="btn-enter">enter</button>

                    <button class="btn-caps">Caps Lock</button>
                    <button>A</button>
                    <button>S</button> 
                    <button>D</button>
                    <button>F</button>
                    <button>G</button>
                    <button>H</button>
                    <button>J</button>
                    <button>K</button>
                    <button>L</button>
                    <button>Ç</button>
                    <button>^ <br> ~</button>
                    <button>&rbrace;<br>] º</button>

                    <button>Shift</button>
                    <button>| <br> \</button>
                    <button>Z</button>
                    <button>X</button>
                    <button>C</button>
                    <button>V</button>
                    <button>B</button>
                    <button>N</button>
                    <button>M</button>
                    <button>&lt; <br> ,</button>
                    <button>&gt; <br> .</button>
                    <button>: <br> ;</button>
                    <button class="btn-shift">Shift</button>

                    <button class="btn-ctrl">Ctrl</button>
                    <button>Fn</button>
                    <button>Win</button>
                    <button>Alt</button>
                    <button class="btn-space">Space</button>
                    <button>alt gr</button>
                    <button>? <br> / ° </button>
                    <button class="btn-ctrl">Ctrl</button>
                </div>
            </section>
        </section>
        <section class="blur-background">
            <section class="texto-inicial">
                <h1>Bem-vindo ao Typing Trainer!</h1>
                <p>Treine seu tempo de digitação e melhore suas habilidades de digitação com nosso site interativo.</p>
                <p><span>PRESSIONE</span> qualquer tecla para começar!</p>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
